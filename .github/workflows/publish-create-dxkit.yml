name: Publish create-dxkit

# Sibling release pipeline for the `@vyuhlabs/create-dxkit` bootstrap
# shim. Fires on a release whose tag starts with `create-dxkit@` (e.g.
# `create-dxkit@v0.1.0`). Mirrors the main `publish.yml` preflight set
# — version-match, on-main, CI-green, not-already-on-npm — applied to
# the sub-package's own `package.json` and `npm view` slot.
#
# Release sequence (mirror of the main package, scoped to the shim):
#
#   git tag -a create-dxkit@v0.1.0 -m "Initial create-dxkit shim"
#   git push origin create-dxkit@v0.1.0
#   gh release create create-dxkit@v0.1.0 --title "create-dxkit v0.1.0"
#
# Bump the version in `packages/create-dxkit/package.json` before
# tagging — preflight 1/4 catches the drift if you forget.

on:
  release:
    types: [published]

jobs:
  publish:
    if: startsWith(github.ref_name, 'create-dxkit@')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance via OIDC
      actions: read # required for `gh run list` against the tagged SHA
    defaults:
      run:
        working-directory: packages/create-dxkit
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Preflight — tag matches packages/create-dxkit/package.json version
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          # Strip the `create-dxkit@v` prefix to get the bare semver.
          TAG_VERSION="${TAG_NAME#create-dxkit@v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_NAME (version $TAG_VERSION) does not match packages/create-dxkit/package.json version $PKG_VERSION"
            exit 1
          fi
          echo "✓ Tag $TAG_NAME matches package.json version $PKG_VERSION"

      - name: Preflight — tagged commit is on main
        working-directory: ${{ github.workspace }}
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" refs/remotes/origin/main; then
            echo "::error::Tagged commit ${GITHUB_SHA} is not reachable from origin/main"
            exit 1
          fi
          echo "✓ Tagged commit ${GITHUB_SHA} is an ancestor of origin/main"

      - name: Preflight — CI is green on tagged commit
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONCLUSION=$(gh run list \
            --workflow CI \
            --commit "${GITHUB_SHA}" \
            --json conclusion,status \
            --jq '.[0].conclusion // "missing"')
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::CI is not green on tagged commit ${GITHUB_SHA} (got: ${CONCLUSION})"
            exit 1
          fi
          echo "✓ CI is green on ${GITHUB_SHA}"

      - name: Preflight — version not already on npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@vyuhlabs/create-dxkit@${VERSION}" version >/dev/null 2>&1; then
            echo "::error::@vyuhlabs/create-dxkit@${VERSION} is already published on npm"
            exit 1
          fi
          echo "✓ @vyuhlabs/create-dxkit@${VERSION} is available on npm"

      - name: Pack tarball
        id: pack
        run: |
          TARBALL=$(npm pack --silent)
          SHASUM=$(sha1sum "$TARBALL" | awk '{print $1}')
          echo "tarball=$(pwd)/$TARBALL" >> "$GITHUB_OUTPUT"
          echo "shasum=$SHASUM" >> "$GITHUB_OUTPUT"
          echo "✓ Built $TARBALL (sha1: $SHASUM)"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public "${{ steps.pack.outputs.tarball }}"

      - name: Verify npm shasum matches local tarball
        run: |
          VERSION=$(node -p "require('./package.json').version")
          REMOTE_SHASUM=""
          for i in 1 2 3 4 5 6; do
            REMOTE_SHASUM=$(npm view "@vyuhlabs/create-dxkit@${VERSION}" dist.shasum 2>/dev/null || true)
            if [ -n "$REMOTE_SHASUM" ]; then break; fi
            sleep 3
          done
          LOCAL_SHASUM="${{ steps.pack.outputs.shasum }}"
          if [ -z "$REMOTE_SHASUM" ]; then
            echo "::error::npm never reported a shasum for @vyuhlabs/create-dxkit@${VERSION}"
            exit 1
          fi
          if [ "$REMOTE_SHASUM" != "$LOCAL_SHASUM" ]; then
            echo "::error::npm shasum ($REMOTE_SHASUM) does not match local tarball shasum ($LOCAL_SHASUM)"
            exit 1
          fi
          echo "✓ Shasum verified: ${REMOTE_SHASUM}"

      - name: Upload tarball as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vyuhlabs-create-dxkit-${{ github.ref_name }}
          path: ${{ steps.pack.outputs.tarball }}
          retention-days: 90
