name: smoke tests

# End-to-end packaging + devcontainer smoke tests. These run on a
# fresh CI runner that has none of the host-local state our `npm
# pack --dry-run` step in ci.yml can't see. Catches:
#   - Files that are committed to the repo but missing from
#     `package.json` `files` (would ship as if-broken to npm consumers).
#   - Templates that copy-templates.js forgot to ship to `templates/`.
#   - `dxkit init --full` writing files the post-install hook expects.
#   - The baseline + guardrail flow actually surfacing a real-world
#     regression on the dxkit repo itself.
#
# The devcontainer build runs only when the devcontainer template
# changes OR on the release branches — it pulls a 2GB+ universal
# image and takes 10-15 minutes, too heavy for every PR.

on:
  pull_request:
    # Include `labeled` so a `smoke:devcontainer` label added after the
    # PR was opened actually re-triggers the workflow. The default
    # activity types (opened, synchronize, reopened) miss this case.
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main, 'release/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # The FIRST command a new user runs (`npm init @vyuhlabs/dxkit`) must never
  # break — and its worst shipped break was Windows-only: Node's
  # CVE-2024-27980 fix makes a shell-less `.cmd` spawn throw EINVAL, so the
  # old shim could never install on a current Windows Node, and no
  # Linux-only job could see it — it surfaced in the field. This job runs
  # the shim's unit + child-process integration suites on a real Windows
  # Node, then performs the real first run: the PR's shim, launched by real
  # npm (which sets `npm_execpath` exactly as `npm init` does), installing
  # the published @vyuhlabs/dxkit into a fresh git repo.
  first-run-windows:
    name: windows first run (create-dxkit shim)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Shim unit + entry-point integration tests (real Windows spawn semantics)
        run: npx vitest run test/create-dxkit.test.ts test/create-dxkit-entrypoint.test.ts

      - name: Real first run in a fresh repo
        shell: pwsh
        run: |
          $fixture = Join-Path $env:RUNNER_TEMP 'first-run'
          New-Item -ItemType Directory -Path $fixture | Out-Null
          Set-Location $fixture
          git init -q -b main
          git config user.email "smoke@example.com"
          git config user.name "smoke"
          # `npm exec --package <dir>` launches the PR's shim under real npm,
          # with the same env (`npm_execpath` et al.) `npm init @vyuhlabs/dxkit`
          # provides. `--dx-only` keeps the published init's work light (agent
          # context only — no scanner provisioning on a bare runner).
          npm exec --yes --package "$env:GITHUB_WORKSPACE\packages\create-dxkit" -- create-dxkit --dx-only --yes
          if ($LASTEXITCODE -ne 0) { throw "create-dxkit exited $LASTEXITCODE" }
          if (-not (Test-Path 'node_modules/@vyuhlabs/dxkit')) { throw 'dxkit was not installed into the fixture' }
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          if (-not $pkg.devDependencies.'@vyuhlabs/dxkit') { throw 'dxkit devDependency was not declared' }

  pack-smoke:
    name: npm pack + init --full + baseline + guardrail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Build npm tarball
        id: pack
        run: |
          tarball=$(npm pack --silent)
          echo "tarball=$(pwd)/${tarball}" >> "$GITHUB_OUTPUT"
          echo "Built tarball: ${tarball}"

      # The main package depends on @vyuhlabs/dxkit-sdk (the frozen extension
      # surface, a sibling workspace package). Installing the main tarball in
      # a fresh repo must not assume the registry already has the matching SDK
      # version — pack the SDK too and install the PAIR, which also smokes
      # exactly what a release ships.
      - name: Build sdk tarball
        id: pack-sdk
        run: |
          cd packages/dxkit-sdk
          tarball=$(npm pack --silent)
          echo "tarball=$(pwd)/${tarball}" >> "$GITHUB_OUTPUT"
          echo "Built sdk tarball: ${tarball}"

      - name: Install tarball into a fresh consumer repo
        run: |
          set -euo pipefail
          mkdir -p /tmp/dxkit-smoke
          cd /tmp/dxkit-smoke
          git init -q -b main
          git config user.email "smoke@example.com"
          git config user.name "smoke"
          # Seed a small TypeScript project so the analyzers have
          # something to scan. dxkit's pre-built scanners detect a
          # node stack from `package.json`.
          cat > package.json <<'EOF'
          {
            "name": "dxkit-smoke",
            "version": "0.0.0",
            "private": true
          }
          EOF
          mkdir -p src
          cat > src/index.ts <<'EOF'
          export function add(a: number, b: number): number {
            return a + b;
          }
          EOF
          git add . && git commit -q -m "init"
          npm install --save-dev "${{ steps.pack-sdk.outputs.tarball }}" "${{ steps.pack.outputs.tarball }}"

      - name: Run `vyuh-dxkit init --full --yes`
        run: |
          set -euo pipefail
          cd /tmp/dxkit-smoke
          # Exercise the opt-in flags too — --with-precommit-hook
          # for the pre-commit hook (default-off), --with-pr-review
          # for the AI PR-review workflow (default-off). The smoke
          # asserts they install correctly when opted in.
          #
          # --no-finish: this job tests baseline + guardrail MECHANICS as
          # discrete steps below, so init must NOT run its finishing arc
          # (which would provision scanners + pre-create the baseline in a
          # bare toolchain-free runner). It keeps the "Capture baseline"
          # step the unit under test.
          ./node_modules/.bin/vyuh-dxkit init --full --yes --no-finish \
            --with-precommit-hook \
            --with-pr-review

      - name: Assert ship templates landed
        run: |
          set -euo pipefail
          cd /tmp/dxkit-smoke
          for f in \
            .githooks/pre-commit \
            .githooks/pre-push \
            .devcontainer/devcontainer.json \
            .devcontainer/post-create.sh \
            .devcontainer/install-agent-clis.sh \
            .github/workflows/dxkit-guardrails.yml \
            .github/workflows/dxkit-baseline-refresh.yml \
            .github/workflows/pr-review.yml \
            .gitignore \
            .dxkit-ignore
          do
            if [ ! -f "$f" ]; then
              echo "::error::Missing expected file after init --full: $f"
              exit 1
            fi
          done
          # Verify executables (POSIX bit set on the hook scripts).
          for f in .githooks/pre-commit .githooks/pre-push .devcontainer/post-create.sh .devcontainer/install-agent-clis.sh; do
            if [ ! -x "$f" ]; then
              echo "::error::Expected executable: $f"
              exit 1
            fi
          done
          # The baseline-refresh workflow must have its branch placeholder
          # substituted — the consumer repo defaults to `main`.
          if ! grep -q 'branches: \[main\]' .github/workflows/dxkit-baseline-refresh.yml; then
            echo "::error::baseline-refresh workflow did not substitute default branch"
            cat .github/workflows/dxkit-baseline-refresh.yml
            exit 1
          fi
          # Verify .gitignore got the runtime-output entries.
          if ! grep -q '\.dxkit/reports/' .gitignore; then
            echo "::error::.gitignore missing .dxkit/reports/ entry"
            cat .gitignore
            exit 1
          fi
          # Verify package.json got the postinstall hooks-activation wire-up
          # — every clone + `npm install` should auto-set core.hooksPath.
          if ! grep -q 'vyuh-dxkit hooks activate' package.json; then
            echo "::error::package.json missing postinstall 'vyuh-dxkit hooks activate'"
            cat package.json
            exit 1
          fi
          # And the activation actually works end-to-end: re-run `npm
          # install` (which re-fires postinstall) and verify
          # core.hooksPath landed on '.githooks'.
          rm -rf .git/config.lock || true
          git config --local --unset core.hooksPath 2>/dev/null || true
          npm install --silent >/dev/null 2>&1 || true
          hooks_path="$(git config --local --get core.hooksPath || echo '')"
          if [ "$hooks_path" != ".githooks" ]; then
            echo "::error::postinstall didn't activate hooks (core.hooksPath = '$hooks_path')"
            exit 1
          fi
          echo "postinstall hooks-activation validated."
          # And the bare-`init` default of pre-commit being opt-in:
          # re-run init in a separate dir without --with-precommit-hook
          # and assert it's NOT installed.
          mkdir -p /tmp/dxkit-smoke-default
          cd /tmp/dxkit-smoke-default
          git init -q
          npm init -y >/dev/null
          npm install --save-dev "${{ steps.pack-sdk.outputs.tarball }}" "${{ steps.pack.outputs.tarball }}" --silent
          # --no-finish: this dir only asserts default-off ship surfaces, no
          # baseline/guardrail — skip the arc so it stays fast + toolchain-free.
          ./node_modules/.bin/vyuh-dxkit init --full --yes --no-finish
          if [ -f .githooks/pre-commit ]; then
            echo "::error::pre-commit hook should NOT install without --with-precommit-hook"
            exit 1
          fi
          if [ ! -f .githooks/pre-push ]; then
            echo "::error::pre-push hook should always install under --full"
            exit 1
          fi
          if [ -f .github/workflows/pr-review.yml ]; then
            echo "::error::pr-review.yml should NOT install without --with-pr-review"
            exit 1
          fi
          echo "Default-off behavior validated."

      - name: Capture baseline
        run: |
          set -euo pipefail
          cd /tmp/dxkit-smoke
          # This smoke job validates baseline MECHANICS in a bare runner
          # without the scanner toolchain installed, so `baseline create`
          # would (correctly) refuse to write an incomplete baseline
          # non-interactively. --allow-incomplete opts in: we're testing
          # the file gets written + the guardrail diffs it, not coverage.
          ./node_modules/.bin/vyuh-dxkit baseline create --allow-incomplete
          test -f .dxkit/baselines/main.json

      - name: Inject a regression + assert guardrail blocks
        run: |
          set -euo pipefail
          cd /tmp/dxkit-smoke
          # New oversized file in a primary-source location — trips
          # the test-gap producer (no test file alongside) and the
          # large-file producer (if we make it > 500 lines).
          {
            echo '// dxkit-smoke synthetic regression'
            for i in $(seq 1 600); do
              echo "export const x${i} = ${i};"
            done
          } > src/regression.ts
          # Run guardrail check; expect non-zero exit.
          if ./node_modules/.bin/vyuh-dxkit guardrail check; then
            echo "::error::guardrail check should have blocked a synthetic regression but exited 0"
            exit 1
          fi
          echo "Guardrail blocked the regression as expected."

      - name: Restore + assert guardrail passes
        run: |
          set -euo pipefail
          cd /tmp/dxkit-smoke
          rm src/regression.ts
          if ! ./node_modules/.bin/vyuh-dxkit guardrail check; then
            echo "::error::guardrail check should have passed on the restored baseline state but exited non-zero"
            exit 1
          fi
          echo "Guardrail passed on clean state as expected."

      # 4.0.1 class-fix. Every shipped workflow template carried a bare `npm ci`,
      # so a repo whose tree only resolves under --legacy-peer-deps died at the
      # install step and the guardrail never ran — the check we ask customers to
      # make REQUIRED was red on their first PR. Nothing caught it: no test
      # EXECUTES a generated workflow, and the fixture above is a package.json with
      # no dependencies at all, so `npm ci` there cannot fail. This runs the REAL
      # rendered step against a REAL conflicting tree, in the order a real
      # onboarding hits it (the repo's own install, then the dxkit devDep, then
      # init) — that order matters, because it is what keeps package.json and the
      # lockfile in sync. A desynced lockfile fails `npm ci` with EUSAGE for an
      # unrelated reason and would make this guard test nothing.
      - name: Generated workflow's install step survives a peer-conflicted tree
        run: |
          set -euo pipefail
          mkdir -p /tmp/dxkit-peer
          cd /tmp/dxkit-peer
          git init -q -b main
          git config user.email "smoke@example.com"
          git config user.name "smoke"
          # eslint 10 at the root against a config that peer-requires eslint 8:
          # the real shape that broke. npm rejects this tree without
          # --legacy-peer-deps, while the repo itself installs and ships fine.
          cat > package.json <<'EOF'
          {
            "name": "dxkit-peer-conflict",
            "version": "0.0.0",
            "private": true,
            "devDependencies": {
              "eslint": "^10.0.0",
              "@loopback/eslint-config": "^16.0.1"
            }
          }
          EOF
          mkdir -p src && echo 'export const x = 1;' > src/index.ts
          npm install --legacy-peer-deps --silent
          git add -A && git commit -q -m "init"
          npm install --save-dev --legacy-peer-deps --silent \
            "${{ steps.pack-sdk.outputs.tarball }}" "${{ steps.pack.outputs.tarball }}"
          ./node_modules/.bin/vyuh-dxkit init --full --yes --no-finish

          # The fixture must actually BE conflicted, or this guard rots into a
          # vacuous pass. Assert the negative first, and assert the RIGHT negative:
          # ERESOLVE (a peer conflict) and not EUSAGE (a desynced lockfile).
          rm -rf node_modules
          if npm ci >/dev/null 2>&1; then
            echo "::error::fixture is no longer peer-conflicted — a bare 'npm ci' succeeded, so this step cannot catch the regression it exists for. Fix the fixture."
            exit 1
          fi
          # Capture first, then match. Under `set -o pipefail` a
          # `npm ci | grep -q` pipeline returns npm's non-zero exit, not grep's,
          # so the match result would be unreadable and this check would fire on
          # a CORRECT fixture.
          ci_out=$(npm ci 2>&1 || true)
          if ! printf '%s' "$ci_out" | grep -q "code ERESOLVE"; then
            echo "::error::fixture fails for the WRONG reason (expected code ERESOLVE — a peer conflict). This guard would not prove the fix:"
            printf '%s\n' "$ci_out" | head -5
            exit 1
          fi
          echo "✓ fixture confirmed peer-conflicted (bare 'npm ci' fails with ERESOLVE)"

          # Execute the install step exactly as the generated workflow ships it.
          node -e "
            const yaml = require('${{ github.workspace }}/node_modules/js-yaml');
            const fs = require('fs');
            const wf = yaml.load(fs.readFileSync('.github/workflows/dxkit-guardrails.yml', 'utf8'));
            const steps = Object.values(wf.jobs)[0].steps;
            const step = steps.find(s => s.name && s.name.startsWith('Install dependencies'));
            if (!step) { console.error('no install step in the rendered workflow'); process.exit(1); }
            fs.writeFileSync('/tmp/rendered-install-step.sh', step.run);
          "
          echo "==> running the rendered install step:"
          cat /tmp/rendered-install-step.sh
          rm -rf node_modules
          if ! bash -e /tmp/rendered-install-step.sh; then
            echo "::error::the generated dxkit-guardrails.yml install step FAILED on a peer-conflicted repo — this is the 4.0.0 defect (a bare npm ci). The guardrail would never run, and the required check would be red on the customer's first PR."
            exit 1
          fi
          test -x node_modules/.bin/vyuh-dxkit || {
            echo "::error::install step exited 0 but dxkit is not resolvable — the guardrail still could not run."
            exit 1
          }
          echo "✓ generated workflow's install step survived a peer-conflicted tree"

  devcontainer-smoke:
    name: devcontainer build + post-create
    runs-on: ubuntu-latest
    # Heavy job — universal image pull is ~2GB. Only run on
    # devcontainer template changes or release-branch pushes.
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'smoke:devcontainer')
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Build npm tarball
        id: pack
        run: |
          tarball=$(npm pack --silent)
          echo "tarball=$(pwd)/${tarball}" >> "$GITHUB_OUTPUT"

      # Pack the sdk sibling too — the main tarball's @vyuhlabs/dxkit-sdk
      # dependency must resolve from the pair, not the registry (see the
      # pack-smoke job's note).
      - name: Build sdk tarball
        id: pack-sdk
        run: |
          cd packages/dxkit-sdk
          tarball=$(npm pack --silent)
          echo "tarball=$(pwd)/${tarball}" >> "$GITHUB_OUTPUT"

      - name: Stage a consumer repo with --with-devcontainer
        # Stage inside `${{ github.workspace }}/consumer/` because the
        # devcontainers/ci action looks for the config relative to the
        # workspace root via the `subFolder` input. A path outside the
        # workspace (e.g. `/tmp/...`) doesn't reach it.
        run: |
          set -euo pipefail
          mkdir -p "${{ github.workspace }}/consumer"
          cd "${{ github.workspace }}/consumer"
          git init -q -b main
          # Seed a root commit so `baseline create` (run inside the
          # devcontainer below) can derive the deterministic salt
          # from `git rev-list --max-parents=0 HEAD`. The pack-smoke
          # job above already follows this pattern.
          git config user.email "smoke@example.com"
          git config user.name "smoke"
          echo '{"name":"dc-smoke","private":true}' > package.json
          git add package.json
          git commit -q -m "init"
          npm install --save-dev "${{ steps.pack-sdk.outputs.tarball }}" "${{ steps.pack.outputs.tarball }}"
          ./node_modules/.bin/vyuh-dxkit init --with-devcontainer --yes
          test -f .devcontainer/devcontainer.json
          # Per-stack devcontainer features (Phase 2.5.1): the consumer
          # has no detectable language pack active beyond TypeScript-
          # default (Node always-on), so the rendered features block
          # must contain Node + GitHub CLI and must NOT contain the
          # toolchains for inactive packs.
          if ! grep -q 'ghcr.io/devcontainers/features/node:1' .devcontainer/devcontainer.json; then
            echo "::error::devcontainer.json missing always-on node feature"
            cat .devcontainer/devcontainer.json
            exit 1
          fi
          for inactive in python:1 dotnet:2 ruby:1 java:1 rust:1 go:1; do
            if grep -q "ghcr.io/devcontainers/features/${inactive}" .devcontainer/devcontainer.json; then
              echo "::error::devcontainer.json includes feature ${inactive} on a Node-only repo"
              cat .devcontainer/devcontainer.json
              exit 1
            fi
          done
          echo "Per-stack devcontainer features validated."

      - name: Build + run devcontainer, exercise post-create
        uses: devcontainers/ci@v0.3
        with:
          subFolder: consumer
          push: never
          # Inside the container: verify the AI-agent CLIs and the
          # scanner toolchain installed successfully. Skip the CLI
          # check when the env opt-outs are set so a future user can
          # configure either CLI off without failing this job.
          runCmd: |
            set -euo pipefail
            # Resolve the dxkit binary: prefer the project-local
            # install when post-create's `npm install` succeeded;
            # fall back to the globally-installed version that
            # post-create's last-ditch fallback brings in. (Inside
            # this CI smoke the consumer's lockfile points at a
            # host-only tarball path that doesn't exist in the
            # container, so the project-local install soft-fails
            # and global is what we end up with.)
            if [ -x ./node_modules/.bin/vyuh-dxkit ]; then
              DXKIT="./node_modules/.bin/vyuh-dxkit"
            else
              DXKIT="vyuh-dxkit"
            fi
            echo "==> Using dxkit: $DXKIT"
            echo "==> Verifying scanner toolchain"
            "$DXKIT" tools list
            echo "==> Verifying agent CLIs"
            command -v claude || echo "WARN: claude CLI not on PATH"
            command -v codex  || echo "WARN: codex  CLI not on PATH"
            echo "==> Smoke: baseline create inside container"
            # --allow-incomplete: the devcontainer installs the toolchain,
            # but pass it defensively so a single tool that didn't install
            # doesn't fail the smoke on the new incomplete-baseline gate.
            "$DXKIT" baseline create --allow-incomplete
            test -f .dxkit/baselines/main.json
