name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full history + base branch so slop check can diff against it.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      # Cross-ecosystem benchmark toolchains. Required by
      # test/integration/cross-ecosystem.test.ts. Each ecosystem
      # provides BOTH a vulnerability scanner (10h.6.8) AND a linter
      # (10i.0.2). Tests `skipIf` the relevant binary is missing, so
      # any gap silently shrinks the regression surface — install all.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Cache the toolchain bins/venvs that are otherwise re-installed
      # on every CI run. pipx tools live under ~/.local/pipx/venvs;
      # detekt + PMD unzip into ~/.local/share + ~/.local/bin; gitleaks
      # lands in ~/.local/bin via curl. Keying on os + manual bump
      # version means cache stays valid until we intentionally rotate
      # tool versions (bump the `v1` suffix to invalidate). Saves
      # ~2 min/run, ~$20-100/mo at typical team CI volume.
      - name: Cache scanner toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/pipx
            ~/.local/bin
            ~/.local/share/detekt
            ~/.local/share/pmd
          key: dxkit-scanner-toolchain-${{ runner.os }}-v2

      - run: pipx install pip-audit # depVulns
      - run: pipx install ruff # lint (Phase 10i.0.2)
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest # depVulns
      - name: Install golangci-lint # lint (Phase 10i.0.2)
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b $(go env GOPATH)/bin v1.64.8
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy # lint (Phase 10i.0.2) — clippy ships in the toolchain but isn't a default component
      - name: Cache cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}
      - name: Install cargo-audit (if not cached) # depVulns
        run: command -v cargo-audit || cargo install --locked cargo-audit
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0' # bundles `dotnet format` (used by C# lint, Phase 10i.0.2)
      - uses: actions/setup-java@v4 # detekt (Kotlin lint, Phase 10j.1) is a JVM tool
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install detekt # lint (Phase 10j.1) — Kotlin static analysis (Checkstyle XML output)
        run: |
          mkdir -p ~/.local/share/detekt ~/.local/bin
          curl -sSfL -o /tmp/detekt-cli.zip \
            https://github.com/detekt/detekt/releases/download/v1.23.6/detekt-cli-1.23.6.zip
          unzip -q -o /tmp/detekt-cli.zip -d ~/.local/share/detekt
          chmod +x ~/.local/share/detekt/detekt-cli-1.23.6/bin/detekt-cli
          ln -sf ~/.local/share/detekt/detekt-cli-1.23.6/bin/detekt-cli ~/.local/bin/detekt-cli
          ln -sf ~/.local/share/detekt/detekt-cli-1.23.6/bin/detekt-cli ~/.local/bin/detekt
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Install PMD # lint (Phase 10k.1.3) — Java source-level analyzer (JSON output)
        run: |
          mkdir -p ~/.local/share/pmd ~/.local/bin
          curl -sSfL -o /tmp/pmd.zip \
            "https://github.com/pmd/pmd/releases/download/pmd_releases%2F7.24.0/pmd-dist-7.24.0-bin.zip"
          unzip -q -o /tmp/pmd.zip -d ~/.local/share/pmd
          chmod +x ~/.local/share/pmd/pmd-bin-7.24.0/bin/pmd
          ln -sf ~/.local/share/pmd/pmd-bin-7.24.0/bin/pmd ~/.local/bin/pmd
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - uses: ruby/setup-ruby@v1 # rubocop (Ruby lint, Phase 10k.2.5) needs a managed Ruby toolchain
        with:
          ruby-version: '3.3'
      - name: Install rubocop # lint (Phase 10k.2.5) — Ruby static analyzer (JSON output)
        run: |
          gem install rubocop --no-document
          # ruby/setup-ruby's gem bin is already on PATH, but add it
          # explicitly to $GITHUB_PATH so subsequent steps see rubocop
          # without relying on shell-init.
          echo "$(gem env executable_directory)" >> $GITHUB_PATH

      - name: Install gitleaks # secrets (matrix, Phase 10i.0.1) — was riding the toolchain cache only
        run: |
          mkdir -p ~/.local/bin
          command -v gitleaks || { \
            curl -sSfL -o /tmp/gitleaks.tgz \
              https://github.com/gitleaks/gitleaks/releases/download/v8.24.0/gitleaks_8.24.0_linux_x64.tar.gz && \
            tar -C ~/.local/bin -xzf /tmp/gitleaks.tgz gitleaks && chmod +x ~/.local/bin/gitleaks; }
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # depVulns (Maven / RubyGems / SwiftURL). Unconditional overwrite, not
      # command -v guarded: 2.4.0 is the FIRST release whose Package.resolved
      # extractor works (2.3.8 emitted an empty ecosystem — every Swift dep
      # read clean), and a stale cached binary must not survive the bump.
      - name: Install osv-scanner 2.4.0
        run: |
          mkdir -p ~/.local/bin
          curl -sSfL -o ~/.local/bin/osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v2.4.0/osv-scanner_linux_amd64
          chmod +x ~/.local/bin/osv-scanner
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install SwiftLint # lint (4.1) — the static linux binary is self-contained (no swift toolchain)
        run: |
          mkdir -p ~/.local/bin
          curl -sSfL -o /tmp/swiftlint.zip \
            https://github.com/realm/SwiftLint/releases/download/0.65.0/swiftlint_linux_amd64.zip
          unzip -q -o /tmp/swiftlint.zip -d /tmp/swiftlint
          install -m 0755 /tmp/swiftlint/swiftlint-static ~/.local/bin/swiftlint
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install phpcs # lint (4.1) — phar on the runner's preinstalled php
        run: |
          mkdir -p ~/.local/bin
          curl -sSfL -o ~/.local/bin/phpcs \
            https://github.com/PHPCSStandards/PHP_CodeSniffer/releases/download/4.0.1/phpcs.phar
          chmod a+x ~/.local/bin/phpcs
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck (tests)
        run: npm run typecheck:test

      - name: Lint
        run: npx eslint . --max-warnings 0

      - name: Format check
        run: npx prettier --check .

      - name: Architecture rules
        run: bash scripts/check-architecture.sh

      - name: Cross-ecosystem coverage parity (Phase 10i.0.5)
        run: bash scripts/check-cross-ecosystem-coverage.sh

      - name: Doc coverage parity (Recipe v3 / G5)
        run: bash scripts/check-docs-coverage.sh

      - name: Slop check (vs base branch)
        if: github.event_name == 'pull_request'
        env:
          DXKIT_SLOP_BASE: origin/${{ github.base_ref }}
        run: bash scripts/check-slop.sh

      - name: Build
        run: npm run build

      - name: Tests with coverage
        run: npx vitest run --coverage

      - name: Coverage threshold
        run: bash scripts/check-coverage.sh

      - name: Integration tests
        # `test/integration/` is excluded from the default unit suite so
        # the local push gate stays under 5 minutes. CI still validates
        # the full-pipeline regression here. No coverage instrumentation
        # — these tests exist for behavioral assertions across the
        # analyzer entry points, not coverage delta.
        run: npm run test:integration

      - name: Verify pack
        run: npm pack --dry-run
