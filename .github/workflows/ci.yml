name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full history + base branch so slop check can diff against it.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      # Cross-ecosystem benchmark toolchains. Required by
      # test/integration/cross-ecosystem.test.ts (Phase 10h.6.8) which
      # validates the Python / Go / Rust / C# packs against real
      # ecosystem-tool output. Each test skipIf its binary is missing,
      # so missing any one of these would silently shrink the regression
      # surface — install all four.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pipx install pip-audit
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}
      - name: Install cargo-audit (if not cached)
        run: command -v cargo-audit || cargo install --locked cargo-audit
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npx eslint . --max-warnings 0

      - name: Format check
        run: npx prettier --check .

      - name: Architecture rules
        run: bash scripts/check-architecture.sh

      - name: Slop check (vs base branch)
        if: github.event_name == 'pull_request'
        env:
          DXKIT_SLOP_BASE: origin/${{ github.base_ref }}
        run: bash scripts/check-slop.sh

      - name: Build
        run: npm run build

      - name: Tests with coverage
        run: npx vitest run --coverage

      - name: Coverage threshold
        run: bash scripts/check-coverage.sh

      - name: Verify pack
        run: npm pack --dry-run
