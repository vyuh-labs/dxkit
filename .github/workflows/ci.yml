name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full history + base branch so slop check can diff against it.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      # Cross-ecosystem benchmark toolchains. Required by
      # test/integration/cross-ecosystem.test.ts. Each ecosystem
      # provides BOTH a vulnerability scanner (10h.6.8) AND a linter
      # (10i.0.2). Tests `skipIf` the relevant binary is missing, so
      # any gap silently shrinks the regression surface — install all.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pipx install pip-audit # depVulns
      - run: pipx install ruff # lint (Phase 10i.0.2)
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest # depVulns
      - name: Install golangci-lint # lint (Phase 10i.0.2)
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b $(go env GOPATH)/bin v1.64.8
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy # lint (Phase 10i.0.2) — clippy ships in the toolchain but isn't a default component
      - name: Cache cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}
      - name: Install cargo-audit (if not cached) # depVulns
        run: command -v cargo-audit || cargo install --locked cargo-audit
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0' # bundles `dotnet format` (used by C# lint, Phase 10i.0.2)

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npx eslint . --max-warnings 0

      - name: Format check
        run: npx prettier --check .

      - name: Architecture rules
        run: bash scripts/check-architecture.sh

      - name: Slop check (vs base branch)
        if: github.event_name == 'pull_request'
        env:
          DXKIT_SLOP_BASE: origin/${{ github.base_ref }}
        run: bash scripts/check-slop.sh

      - name: Build
        run: npm run build

      - name: Tests with coverage
        run: npx vitest run --coverage

      - name: Coverage threshold
        run: bash scripts/check-coverage.sh

      - name: Verify pack
        run: npm pack --dry-run
