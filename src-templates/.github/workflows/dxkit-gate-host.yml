name: dxkit gate (__DXKIT_GATE_HOST__)

# GENERATED by dxkit from pack-declared execution requirements (CLAUDE.md
# Rule 20). This repo's stack declares capabilities that can only execute on
# a __DXKIT_GATE_HOST__ host (e.g. a `net*-windows` build target), so the
# primary ubuntu gate cannot serve them — it discloses them as "not
# measurable in this environment" and THIS job is where they actually run.
#
# Runs the correctness floor (compile + tests) for the placed pack(s):
# __DXKIT_GATE_PACKS__. Make this job a required PR check alongside
# `dxkit-guardrails` so the PR is green only when BOTH environments pass.
#
# dxkit regenerates this file on `vyuh-dxkit update` when the stack's
# declared requirements change. Deliberately toolchain-neutral: setup
# actions only (never a hardcoded IDE install path — runner images move).

on:
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    # The job `name:` IS the status-check context GitHub reports and that a
    # ruleset / branch protection must require (same invariant as the primary
    # `dxkit-guardrails` job).
    name: dxkit-gate-__DXKIT_GATE_HOST__
    runs-on: __DXKIT_GATE_RUNNER__
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      # Toolchain(s) for the packs placed on this host, rendered from their
      # pack-declared ciSetup (Rule 6) with the repo's DETECTED versions.
__DXKIT_GATE_HOST_SETUP__
      - name: Install dxkit
        shell: bash
        run: |
          if [ -f package.json ]; then
            npm install --no-save @vyuhlabs/dxkit >/dev/null 2>&1 || npm install -g @vyuhlabs/dxkit
          else
            npm install -g @vyuhlabs/dxkit
          fi

      # The floor for the placed packs only — the primary gate already covers
      # everything host-agnostic, so re-running it here would spend minutes
      # re-proving the same result on a slower runner.
      - name: Correctness floor (compile + tests, __DXKIT_GATE_PACKS__)
        shell: bash
        run: |
          if [ -x ./node_modules/.bin/vyuh-dxkit ]; then
            DXKIT=./node_modules/.bin/vyuh-dxkit
          else
            DXKIT=vyuh-dxkit
          fi
          "${DXKIT}" floor check --surface ci --correctness --packs __DXKIT_GATE_PACKS__
