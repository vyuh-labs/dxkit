name: dxkit baseline refresh

# After every merge to main, regenerate `.dxkit/baselines/main.json`
# to capture the new "approved" state of the repo. The next PR's
# guardrail check is gated against this refreshed anchor, so a
# regression introduced in PR N+1 stands out from the noise of
# whatever was merged in PR N.
#
# The auto-commit carries `[skip ci]` so it doesn't re-trigger this
# workflow or the guardrails PR-gate.

on:
  push:
    branches: [__DXKIT_DEFAULT_BRANCH__]
    # Ignore pushes that only changed the baseline file — those are
    # this workflow's own commits, and re-running would be a no-op
    # anyway. Belt-and-braces with [skip ci] below.
    paths-ignore:
      - '.dxkit/baselines/**'

permissions:
  contents: write

jobs:
__DXKIT_FRAGMENT_CAPTURE_JOBS__
  refresh:
    runs-on: ubuntu-latest
__DXKIT_REFRESH_NEEDS__
    # Don't re-run on our own auto-commit (defensive — paths-ignore
    # above already filters the common case).
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # `persist-credentials: true` (the default) leaves the
          # token in .git/config so the final `git push` reuses it.

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      # Language runtime(s) for the detected stack, so the baseline is captured
      # with the SAME native scanner + toolchain the gate uses. Empty on Node-only.
__DXKIT_CI_RUNTIME_SETUP__
      - name: Install dependencies + dxkit
        run: |
          corepack enable >/dev/null 2>&1 || true
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            yarn install --immutable 2>/dev/null || yarn install --frozen-lockfile
          elif [ -f bun.lockb ] || [ -f bun.lock ]; then
            npm install -g bun >/dev/null 2>&1 || true
            bun install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            # A repo whose tree only resolves under --legacy-peer-deps (a peer
            # conflict its own install already tolerates) must not fail the gate.
            # `npm ci` installs the LOCKFILE's tree either way — the flag only
            # skips the peer check that rejects it — so the audited tree is still
            # the tree the repo ships. Re-resolving (`npm install`) is NOT a valid
            # fallback here: it would fabricate a different tree.
            npm ci || npm ci --legacy-peer-deps
          elif [ -f package.json ]; then
            npm install || npm install --legacy-peer-deps
          else
            npm install -g @vyuhlabs/dxkit
          fi

      - name: Install scanner tools
        run: |
          if [ -x ./node_modules/.bin/vyuh-dxkit ]; then
            ./node_modules/.bin/vyuh-dxkit tools install --yes
          else
            vyuh-dxkit tools install --yes
          fi
          # Put every ecosystem's tool-bin dir on PATH so the correct native dep
          # scanner is found (osv-scanner/pip-audit → ~/.local/bin, govulncheck →
          # ~/go/bin, cargo-audit → ~/.cargo/bin); else the audit falls back to a
          # wrong-artifact scanner and the baseline drifts from the gate.
          for d in "$HOME/.local/bin" "$HOME/go/bin" "$HOME/.cargo/bin"; do
            echo "$d" >> "$GITHUB_PATH"
          done

      - name: Recompute baseline
        run: |
          if [ -x ./node_modules/.bin/vyuh-dxkit ]; then
            DXKIT=./node_modules/.bin/vyuh-dxkit
          else
            DXKIT=vyuh-dxkit
          fi
          # `baseline refresh` = capture + the D4 advisory decision lane: newly
          # published dep-vuln advisories (feed moved, no manifest change) are
          # HELD OUT of the baseline — never silently absorbed — and raised as
          # the standing two-lane decision PR (merge = defer time-boxed; fix =
          # upgrade the dependency instead).
          "${DXKIT}" baseline refresh
__DXKIT_FRAGMENT_MERGE_STEPS__

      - name: Commit and push refreshed baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- .dxkit/baselines/; then
            echo "Baseline unchanged — nothing to commit."
            exit 0
          fi
          git add .dxkit/baselines/
          git commit -m "chore(baseline): refresh main anchor [skip ci]"
          git push
