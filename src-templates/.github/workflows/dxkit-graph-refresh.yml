name: dxkit graph refresh

# Keeps the code graph (`.dxkit/reports/graph.json`) FRESH in CI without ever
# committing it. After a merge to the default branch (or weekly / on demand),
# rebuild the graph and store it in the GitHub Actions cache keyed by the merged
# commit SHA — NO git write, so the repo never bloats and history stays clean.
#
# The guardrail workflow restores this cached graph for the PR's base SHA before
# any graph-consuming step (finding context, flow, the loop's context hook), so
# those don't pay a cold rebuild. A cache miss (eviction / first run) just means
# a consumer rebuilds on demand — fail-open, same as the baseline cache-miss.
#
# graph.json is gitignored and stamped with the commit it was built at
# (`meta.commitSha`), so any consumer can tell whether a restored graph matches
# the checkout. Opt-in: installed only when `.dxkit/policy.json:graph.refresh`
# is `"cache"`. Caches evict after ~7 idle days and are LRU-bounded per repo.

on:
  push:
    branches: [__DXKIT_DEFAULT_BRANCH__]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      # Language runtime(s) for the detected stack, so graphify resolves the
      # same symbols the local + gate builds see. Empty on a Node-only repo.
__DXKIT_CI_RUNTIME_SETUP__
      - name: Install dependencies + dxkit
        run: |
          corepack enable >/dev/null 2>&1 || true
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            yarn install --immutable 2>/dev/null || yarn install --frozen-lockfile
          elif [ -f bun.lockb ] || [ -f bun.lock ]; then
            npm install -g bun >/dev/null 2>&1 || true
            bun install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            # A repo whose tree only resolves under --legacy-peer-deps (a peer
            # conflict its own install already tolerates) must not fail the gate.
            # `npm ci` installs the LOCKFILE's tree either way — the flag only
            # skips the peer check that rejects it — so the audited tree is still
            # the tree the repo ships. Re-resolving (`npm install`) is NOT a valid
            # fallback here: it would fabricate a different tree.
            npm ci || npm ci --legacy-peer-deps
          elif [ -f package.json ]; then
            npm install || npm install --legacy-peer-deps
          else
            npm install -g @vyuhlabs/dxkit
          fi

      - name: Install scanner tools
        run: |
          if [ -x ./node_modules/.bin/vyuh-dxkit ]; then
            ./node_modules/.bin/vyuh-dxkit tools install --yes
          else
            vyuh-dxkit tools install --yes
          fi

      - name: Rebuild the code graph
        run: |
          if [ -x ./node_modules/.bin/vyuh-dxkit ]; then
            DXKIT=./node_modules/.bin/vyuh-dxkit
          else
            DXKIT=vyuh-dxkit
          fi
          # `explore refresh` regenerates graph.json (stamped with this commit's
          # SHA) — the one graph-build command; never touches git.
          "${DXKIT}" explore refresh

      - name: Store the graph in the Actions cache
        uses: actions/cache/save@v4
        with:
          path: .dxkit/reports/graph.json
          # Keyed by the merged commit SHA so a PR whose base is this commit
          # restores exactly this graph. The guardrail restores by base SHA with
          # the `dxkit-graph-` prefix as the fallback.
          key: dxkit-graph-${{ github.sha }}
