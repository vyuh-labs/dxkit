name: dxkit flow refresh

# Keeps the committed flow-contract snapshots (`.dxkit/flow/served.json` +
# `consumed.json`) current after each merge to the default branch (or weekly /
# on demand). The gate reads those snapshots OFFLINE, so their freshness is
# what keeps a consumer's `no-route` verdicts honest — dxkit's doctor warns
# when a provider has moved past the committed snapshot; this workflow is what
# closes that gap automatically.
#
# How the refresh LANDS is policy (`.dxkit/policy.json:flow.refreshMode`),
# resolved by the CLI — this workflow carries no landing logic:
#   - `pr` (default): one STANDING `dxkit/flow-refresh` PR, force-updated in
#     place with a contract-change summary. Route REMOVALS lead the body with
#     a warning (they arm the gate against existing consumers once merged);
#     enable GitHub auto-merge on the PR if additions-only updates need no
#     ceremony. Protected-branch-safe.
#   - `push`: commit straight to __DXKIT_DEFAULT_BRANCH__ with [skip ci] —
#     zero ceremony; a protected branch rejects it (use `pr`).
#
# Opt-in: installed only when `.dxkit/policy.json:flow.onMergeRefresh` is true.

on:
  push:
    branches: [__DXKIT_DEFAULT_BRANCH__]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

# contents: write pushes the refresh branch (or the [skip ci] commit in push
# mode); pull-requests: write lets the CLI open/update the standing PR.
permissions:
  contents: write
  pull-requests: write

jobs:
  flow-refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      # Language runtime(s) for the detected stack, so extraction sees the same
      # code the local + gate builds see. Empty on a Node-only repo.
__DXKIT_CI_RUNTIME_SETUP__
      - name: Install dependencies + dxkit
        run: |
          corepack enable >/dev/null 2>&1 || true
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            yarn install --immutable 2>/dev/null || yarn install --frozen-lockfile
          elif [ -f bun.lockb ] || [ -f bun.lock ]; then
            npm install -g bun >/dev/null 2>&1 || true
            bun install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            # A repo whose tree only resolves under --legacy-peer-deps (a peer
            # conflict its own install already tolerates) must not fail the gate.
            # `npm ci` installs the LOCKFILE's tree either way — the flag only
            # skips the peer check that rejects it — so the audited tree is still
            # the tree the repo ships. Re-resolving (`npm install`) is NOT a valid
            # fallback here: it would fabricate a different tree.
            npm ci || npm ci --legacy-peer-deps
          elif [ -f package.json ]; then
            npm install || npm install --legacy-peer-deps
          else
            npm install -g @vyuhlabs/dxkit
          fi

      - name: Refresh + land the flow contract
        env:
          # The CLI shells `gh` to open/update the standing PR in `pr` mode.
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -x ./node_modules/.bin/vyuh-dxkit ]; then
            DXKIT=./node_modules/.bin/vyuh-dxkit
          else
            DXKIT=vyuh-dxkit
          fi
          # Re-gathers the mesh (workspace participants included) and lands the
          # result per policy — publish/landing logic lives in the tested CLI,
          # never in this workflow's bash.
          "${DXKIT}" flow publish --land=policy
