name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Only run if ANTHROPIC_API_KEY is configured
    if: ${{ vars.ENABLE_AI_REVIEW == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Review PR
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Get changed files
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD)

          # Run Claude Code review
          claude -p "You are reviewing a pull request. Review the following changes for:

          1. **Bugs** — Logic errors, null handling, race conditions, off-by-one
          2. **Security** — Hardcoded secrets, injection vectors, auth gaps
          3. **Error handling** — Swallowed errors, missing edge cases
          4. **Breaking changes** — API changes, schema changes, config changes

          Changed files:
          $CHANGED_FILES

          Diff:
          $DIFF

          Rules:
          - Be specific: reference file:line numbers
          - Rate each issue: 🔴 critical / 🟡 warning / 🔵 suggestion
          - Only flag real issues — not style (linters handle that)
          - If everything looks good, say so
          - Keep it concise" > /tmp/review.md

      - name: Post Review Comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.md', 'utf8');
            if (review.trim()) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## Claude Code Review\n\n${review}\n\n---\n*Automated review by [Claude Code](https://claude.ai/claude-code)*`
              });
            }
