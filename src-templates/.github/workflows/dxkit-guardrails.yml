name: dxkit guardrails

# Runs the dxkit guardrail check on every pull request. New regressions
# vs. the committed `.dxkit/baselines/main.json` block the PR. Existing
# findings (your "brownfield debt") are allowed — they were already
# captured when you ran `vyuh-dxkit baseline create`.
#
# Customise by editing your project's `.dxkit/policy.json` (created by
# `vyuh-dxkit init --with-ci`). The matcher's classifications
# (added / relocated / tooling_drift / config_drift / persisted /
# removed / fixed) map to block/warn buckets there.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  guardrail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the git-aware matcher can resolve the
          # baseline's anchor commit + diff against HEAD.
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      # Language runtime(s) for the DETECTED stack (setup-go / setup-python / …),
      # so the pack's native dep scanner can install and the correctness floor can
      # build + run tests. Rendered from active packs at install; empty on a
      # Node-only repo. Node above is dxkit's own CLI runtime.
__DXKIT_CI_RUNTIME_SETUP__
      # Install the project's deps with ITS package manager so the guardrail
      # audits the dependency tree the repo actually SHIPS — not a fabricated npm
      # resolution (a bare `npm install` on a pnpm repo invents a different tree,
      # so the audit both flags phantom vulns and can miss real ones). corepack
      # ships with Node and provides pnpm/yarn with no extra setup action, honoring
      # the repo's `packageManager` field; bun is fetched only when its lockfile is
      # present. A project-local dxkit devDependency is installed along the way.
      - name: Install dependencies + dxkit
        run: |
          corepack enable >/dev/null 2>&1 || true
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            yarn install --immutable 2>/dev/null || yarn install --frozen-lockfile
          elif [ -f bun.lockb ] || [ -f bun.lock ]; then
            npm install -g bun >/dev/null 2>&1 || true
            bun install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            npm install -g @vyuhlabs/dxkit
          fi

      # Install the scanner toolchain dxkit needs for this stack
      # (gitleaks, semgrep, cloc, jscpd, ruff, osv-scanner, etc.).
      # `--yes` makes the install non-interactive; the registry
      # decides what to install based on detected languages.
      - name: Install scanner tools
        run: |
          if [ -x ./node_modules/.bin/vyuh-dxkit ]; then
            ./node_modules/.bin/vyuh-dxkit tools install --yes
          else
            vyuh-dxkit tools install --yes
          fi
          # Put every ecosystem's tool-bin dir on PATH so the correct NATIVE dep
          # scanner is found for whatever language this repo is — osv-scanner /
          # pip-audit in ~/.local/bin, govulncheck in ~/go/bin, cargo-audit in
          # ~/.cargo/bin. Without this the audit can't find its scanner and
          # silently falls back to a wrong-artifact one (e.g. npm-audit on a pnpm
          # repo), drifting from the baseline. Language-agnostic on purpose.
          for d in "$HOME/.local/bin" "$HOME/go/bin" "$HOME/.cargo/bin"; do
            echo "$d" >> "$GITHUB_PATH"
          done

      # Baseline anchor transport (committed modes only; see .dxkit/policy.json
      # baseline.anchor). 'tree' = anchor committed in the repo; 'branch' = dxkit
      # hydrates it from the side branch itself during the check; 'cache' = restore
      # it here from the Actions cache the refresh job wrote for this base commit.
      - name: Detect baseline anchor transport
        id: anchor
        run: |
          T=tree
          if [ -f .dxkit/policy.json ]; then
            T=$(node -e "try{const a=(require('./.dxkit/policy.json').baseline||{}).anchor;process.stdout.write(a||'tree')}catch(e){process.stdout.write('tree')}")
          fi
          echo "transport=$T" >> "$GITHUB_OUTPUT"

      - name: Restore cached baseline anchor
        if: steps.anchor.outputs.transport == 'cache'
        uses: actions/cache/restore@v4
        with:
          path: .dxkit/baselines
          key: dxkit-baseline-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            dxkit-baseline-

      # Capture the markdown report regardless of exit code so we can
      # post it as a PR comment even when the guardrail blocks.
      - name: Run guardrail check
        id: guardrail
        run: |
          if [ -x ./node_modules/.bin/vyuh-dxkit ]; then
            DXKIT=./node_modules/.bin/vyuh-dxkit
          else
            DXKIT=vyuh-dxkit
          fi
          # Cache transport with a cold cache (eviction / first run): fall back to
          # a live ref-based gather for this one run rather than error on a missing
          # anchor. 'branch'/'tree' always have an anchor by check time.
          EXTRA=""
          if [ "${{ steps.anchor.outputs.transport }}" = "cache" ] && ! ls .dxkit/baselines/*.json >/dev/null 2>&1; then
            echo "cache miss — falling back to a ref-based gather for this run"
            EXTRA="--mode ref-based"
          fi
          set +e
          "${DXKIT}" guardrail check $EXTRA --markdown > guardrail-report.md
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          # Surface WHY it blocked in the job log itself (not only the PR
          # comment), so a failed run is diagnosable without leaving it.
          if [ "$code" -ne 0 ]; then
            echo "::group::dxkit guardrail BLOCKED — net-new findings vs the baseline"
            cat guardrail-report.md
            echo "::endgroup::"
            echo "::error::dxkit guardrail blocked: this PR introduced net-new findings vs .dxkit/baselines/main.json (full report above and in the PR comment)."
          else
            echo "✓ dxkit guardrail passed — no net-new findings vs the baseline"
          fi

      # Correctness floor (liveness) — full-scope: does the code compile + do
      # the tests pass? Runs after the finding gate. ADAPTIVE: if this repo
      # already runs its tests in its own CI workflow, this is a no-op here
      # (opt-in). A missing language toolchain fail-opens (this workflow sets up
      # node + the dxkit scanner tools, not every language runtime), so the
      # floor is most meaningful on JS/TS repos and on repos with no test-CI;
      # your own test job is the place for full-language coverage. Tune via
      # .dxkit/policy.json correctness.surfaces.ci or DXKIT_FLOOR_CI.
      - name: Run correctness floor
        run: |
          if [ -x ./node_modules/.bin/vyuh-dxkit ]; then
            DXKIT=./node_modules/.bin/vyuh-dxkit
          else
            DXKIT=vyuh-dxkit
          fi
          "${DXKIT}" floor check --surface ci

      # Interactive flow console (design §E) — a self-contained HTML artifact
      # scoped to THIS PR: the UI→API map + a browser-side request runner for the
      # integrations the diff touches, with any net-new break flagged. dxkit
      # generates it statically and makes no HTTP call; the runner calls from the
      # reviewer's browser with a Base URL + token they enter, never committed.
      # Self-skips (produces nothing to upload) on a repo with no UI→API surface.
      - name: Generate flow console
        id: console
        if: always()
        run: |
          if [ -x ./node_modules/.bin/vyuh-dxkit ]; then
            DXKIT=./node_modules/.bin/vyuh-dxkit
          else
            DXKIT=vyuh-dxkit
          fi
          set +e
          "${DXKIT}" flow console --diff "${{ github.event.pull_request.base.sha }}" \
            --out flow-console.html --json > console.json 2>/dev/null
          set -e
          eps=$(node -e "try{const j=require('./console.json');process.stdout.write(String((j.shownEndpoints||0)+(j.broken||0)))}catch(e){process.stdout.write('0')}" 2>/dev/null || echo 0)
          echo "endpoints=$eps" >> "$GITHUB_OUTPUT"

      - name: Upload flow console
        if: always() && steps.console.outputs.endpoints != '0'
        uses: actions/upload-artifact@v4
        with:
          name: flow-console
          path: flow-console.html
          if-no-files-found: ignore

      - name: Post PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Find a previous dxkit-guardrails comment by marker so we
          # update in place rather than appending a new one per push.
          MARKER='<!-- dxkit-guardrails -->'
          {
            printf '%s\n' "$MARKER"
            cat guardrail-report.md
          } > comment.md
          # Link the flow console artifact when this PR touched an integration.
          if [ "${{ steps.console.outputs.endpoints }}" != "0" ] && [ -f flow-console.html ]; then
            printf '\n\n---\n📊 **[Interactive flow console](%s)** — download from this run'"'"'s **Artifacts** to exercise the %s integration(s) this PR touches (UI→API map + request runner; your auth stays in the browser).\n' \
              "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              "${{ steps.console.outputs.endpoints }}" >> comment.md
          fi
          existing=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
            | head -n1)
          if [ -n "${existing}" ]; then
            gh api -X PATCH \
              "repos/${{ github.repository }}/issues/comments/${existing}" \
              -F body=@comment.md
          else
            gh pr comment "${PR_NUMBER}" --body-file comment.md
          fi

      - name: Fail if guardrail blocked
        run: exit ${{ steps.guardrail.outputs.exit_code }}
